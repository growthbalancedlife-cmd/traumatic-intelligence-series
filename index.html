<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Traumatic Intelligence Series | Vision:MB</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0e0c;
      color: #cdccca;
      font-family: 'Georgia', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }

    .eyebrow {
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #4f98a3;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 400;
      line-height: 1.25;
      color: #f0eeea;
      margin-bottom: 1.25rem;
      max-width: 640px;
    }

    .sub {
      font-size: 1rem;
      color: #9a9790;
      max-width: 480px;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
    }

    .btn-primary {
      display: inline-block;
      padding: 14px 32px;
      background: #4f98a3;
      color: #0f0e0c;
      text-decoration: none;
      border-radius: 4px;
      font-family: sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      transition: background 0.2s ease, transform 0.15s ease;
    }

    .btn-primary:hover {
      background: #6ab4bf;
      transform: translateY(-1px);
    }

    .btn-secondary {
      display: inline-block;
      padding: 14px 32px;
      background: transparent;
      color: #4f98a3;
      text-decoration: none;
      border: 1.5px solid #4f98a3;
      border-radius: 4px;
      font-family: sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      transition: background 0.2s ease, color 0.2s ease, transform 0.15s ease;
    }

    .btn-secondary:hover {
      background: #4f98a3;
      color: #0f0e0c;
      transform: translateY(-1px);
    }

    .divider {
      width: 48px;
      height: 1px;
      background: #4f98a3;
      margin: 2.5rem auto;
      opacity: 0.4;
    }

    .back-link {
      font-family: sans-serif;
      font-size: 0.8rem;
      color: #5a5855;
      text-decoration: none;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .back-link:hover { color: #4f98a3; }

    .countdown {
      font-family: sans-serif;
      font-size: 0.78rem;
      color: #3d3b38;
      margin-top: 2rem;
    }
  </style>
</head>
<body>

  <p class="eyebrow">Vision:MB · The Student &amp; The Teacher</p>

  <h1>Traumatic Intelligence Series</h1>

  <p class="sub">
    A framework for turning pain into perception — built for those who've lived through what they now teach.
  </p>

  <div class="btn-group">
    <a href="./traumatic-intelligence-landing-page%20(2).html" class="btn-primary">
      Enter the Series →
    </a>
    <a href="https://visionmb612.com" target="_blank" rel="noopener" class="btn-secondary">
      ← Back to Vision:MB
    </a>
  </div>

  <div class="divider"></div>

  <a href="https://visionmb612.com" target="_blank" rel="noopener" class="back-link">
    visionmb612.com
  </a>

  <p class="countdown" id="countdown">Redirecting in 7 seconds…</p>

  <script>
    let t = 7;
    const el = document.getElementById('countdown');
    const interval = setInterval(() => {
      t--;
      if (t <= 0) {
        clearInterval(interval);
        window.location.href = './traumatic-intelligence-landing-page%20(2).html';
      } else {
        el.textContent = 'Redirecting in ' + t + ' second' + (t !== 1 ? 's' : '') + '…';
      }
    }, 1000);
  </script>

</body>
</html>
